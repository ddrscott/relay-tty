site_name: relay-tty
site_url: https://docs.relaytty.com
site_description: "Terminal relay — run commands locally, access them from any browser"
repo_url: https://github.com/ddrscott/relay-tty
repo_name: ddrscott/relay-tty

docs_dir: website
site_dir: site

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Getting Started: tutorials/getting-started.md
      - Mobile Access: tutorials/mobile-access.md
      - Sharing a Terminal: tutorials/sharing-terminal.md
  - How-To Guides:
      - how-to/index.md
      - Session Management: how-to/session-management.md
      - Web UI Views: how-to/web-ui-views.md
      - Scratchpad & Search: how-to/scratchpad-search.md
      - Public Tunnel Access: how-to/tunnel-access.md
      - Sharing & QR Codes: how-to/sharing-qr.md
      - Install as Service: how-to/install-service.md
      - File Browser: how-to/file-browser.md
      - Voice Input: how-to/voice-input.md
      - Install as PWA: how-to/pwa-install.md
  - Reference:
      - reference/index.md
      - CLI Commands: reference/cli.md
      - Environment Variables: reference/environment.md
      - Keyboard Shortcuts: reference/keyboard-shortcuts.md
      - Configuration Files: reference/configuration.md
      - WebSocket Protocol: reference/protocol.md
  - Explanation:
      - explanation/index.md
      - Architecture: explanation/architecture.md
      - relay-tty vs tmux & SSH: explanation/vs-tmux-ssh.md
      - Session Lifecycle: explanation/session-lifecycle.md
      - Security Model: explanation/security-model.md

plugins:
  - search
  - llmstxt-md:
      enable_copy_button: false
      sections:
        Tutorials:
          - tutorials/getting-started.md
          - tutorials/mobile-access.md
          - tutorials/sharing-terminal.md
        How-To Guides:
          - how-to/session-management.md
          - how-to/web-ui-views.md
          - how-to/scratchpad-search.md
          - how-to/tunnel-access.md
          - how-to/sharing-qr.md
          - how-to/install-service.md
          - how-to/file-browser.md
          - how-to/voice-input.md
          - how-to/pwa-install.md
        Reference:
          - reference/cli.md
          - reference/environment.md
          - reference/keyboard-shortcuts.md
          - reference/configuration.md
          - reference/protocol.md
        Explanation:
          - explanation/architecture.md
          - explanation/vs-tmux-ssh.md
          - explanation/session-lifecycle.md
          - explanation/security-model.md
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ddrscott/relay-tty
